version: 2

project_name: mint-ca

before:
  hooks:
    - go mod tidy

builds:
  - id: mint-ca
    main: ./cmd/server
    binary: mint-ca
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - docs/Api.md
      - docs/Setup.md
      - docs/UserGuide.md
    format_overrides:
      - goos: windows
        formats: ['zip']

nfpms:
  - id: packages
    package_name: mint-ca
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    vendor: "Imnotndesh"
    homepage: "https://github.com/imnotndesh/mint-ca"
    maintainer: "Brian <brian@ndegwa.uk>"
    description: "mint-ca – a lightweight Certificate Authority server"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/mint-ca/copyright
        file_info:
          mode: 0644

dockers:
  - image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: amd64
    # If you want arm64, uncomment the following block (or use a matrix)
    # - id: arm64
    #   image_templates:
    #     - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Version }}-arm64"
    #   goarch: arm64
    #   skip_push: false

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'